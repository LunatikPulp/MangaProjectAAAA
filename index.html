<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo/springmanga.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPRINGMANGA</title>

    <style>
      /* ═══════════════════════════════════════════════════════════
         SPRINGMANGA — "Techno-Organic Decay" Palette
         Springtrap-inspired horror aesthetic
         ═══════════════════════════════════════════════════════════ */
      :root {
        --c-base: #121212;
        --c-surface: #1A1A1A;
        --c-surface-hover: #252520;
        --c-overlay: #3D2B1F;
        --c-muted: #8a8a7a;
        --c-subtle: #5c5c50;
        --c-text-primary: #E0E0E0;
        --c-text-secondary: #B0B0A0;
        --c-brand: #7A8755;
        --c-brand-hover: #6B7A48;
        --c-brand-accent: #A9FF00;
        /* RGB channels for opacity utilities */
        --c-base-rgb: 18 18 18;
        --c-surface-rgb: 26 26 26;
        --c-surface-hover-rgb: 37 37 32;
        --c-overlay-rgb: 61 43 31;
        --c-text-primary-rgb: 224 224 224;
        --c-text-secondary-rgb: 176 176 160;
        --c-brand-rgb: 122 135 85;
        --c-brand-hover-rgb: 107 122 72;
        --c-brand-accent-rgb: 169 255 0;
        --c-muted-rgb: 138 138 122;

        /* Extra Springtrap tokens */
        --c-rust: #3D2B1F;
        --c-toxic: #A9FF00;
        --c-warning: #D4AF37;
        --c-error: #A9FF00;
        --c-reader-bg: #0F0F0F;
      }

      /* ═══ Light Theme ═══ */
      .light {
        --c-base: #F5F5F0;
        --c-surface: #FFFFFF;
        --c-surface-hover: #EAEAE5;
        --c-overlay: #D0C8B8;
        --c-muted: #8A8A7A;
        --c-subtle: #A0A090;
        --c-text-primary: #1A1A1A;
        --c-text-secondary: #4A4A40;
        --c-brand: #5A6B38;
        --c-brand-hover: #4A5A2E;
        --c-brand-accent: #6B8F00;
        --c-base-rgb: 245 245 240;
        --c-surface-rgb: 255 255 255;
        --c-surface-hover-rgb: 234 234 229;
        --c-overlay-rgb: 208 200 184;
        --c-text-primary-rgb: 26 26 26;
        --c-text-secondary-rgb: 74 74 64;
        --c-brand-rgb: 90 107 56;
        --c-brand-hover-rgb: 74 90 46;
        --c-brand-accent-rgb: 107 143 0;
        --c-muted-rgb: 138 138 122;
        --c-rust: #D0C8B8;
        --c-toxic: #6B8F00;
        --c-warning: #B8960A;
        --c-error: #CC3300;
        --c-reader-bg: #FAFAF5;
      }

      /* Remove scanline overlay in light mode */
      html.light body::after {
        display: none !important;
      }

      /* Softer scrollbar in light mode */
      html.light ::-webkit-scrollbar-track {
        background: #F5F5F0;
        border-left: 1px solid #D0C8B8;
      }
      html.light ::-webkit-scrollbar-thumb {
        background: #5A6B38;
      }
      html.light ::selection {
        background: #6B8F00;
        color: #fff;
      }

      /* ── Scanline overlay ── */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(169, 255, 0, 0.015) 2px,
          rgba(169, 255, 0, 0.015) 4px
        );
      }

      /* ── Flicker animation ── */
      @keyframes springFlicker {
        0%   { opacity: 1; }
        10%  { opacity: 0.88; }
        20%  { opacity: 1; }
        50%  { opacity: 0.92; }
        60%  { opacity: 1; }
        80%  { opacity: 0.85; }
        100% { opacity: 1; }
      }
      .spring-flicker:hover {
        animation: springFlicker 0.4s ease-in-out;
      }

      /* ── Toxic glow on hover ── */
      @keyframes toxicPulse {
        0%, 100% { box-shadow: 0 0 4px rgba(169, 255, 0, 0.2); }
        50%      { box-shadow: 0 0 16px rgba(169, 255, 0, 0.45); }
      }
      .toxic-glow:hover {
        box-shadow: 0 0 12px rgba(169, 255, 0, 0.35);
      }
      .toxic-glow-pulse:hover {
        animation: toxicPulse 1.5s ease-in-out infinite;
      }

      /* ── Rusty decay border (uneven corners) ── */
      .decay-border {
        border-radius: 4px 12px 6px 14px;
        border: 1px solid #3D2B1F;
        background: linear-gradient(135deg, #1A1A1A 0%, #1E1E18 100%);
      }

      /* ── Glitch text effect ── */
      @keyframes glitchText {
        0%   { text-shadow: 2px 0 #A9FF00, -2px 0 #3D2B1F; }
        25%  { text-shadow: -2px 0 #A9FF00, 2px 0 #3D2B1F; }
        50%  { text-shadow: 0 0 #A9FF00, 0 0 #3D2B1F; }
        75%  { text-shadow: 1px -1px #A9FF00, -1px 1px #3D2B1F; }
        100% { text-shadow: 0 0 #A9FF00, 0 0 #3D2B1F; }
      }
      .glitch-text:hover {
        animation: glitchText 0.3s steps(4) 1;
      }

      /* ── System Failure error style ── */
      .system-failure {
        color: #A9FF00;
        border: 1px solid #A9FF00;
        background: rgba(169, 255, 0, 0.05);
        font-family: 'Courier New', monospace;
      }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      // Build all theme utilities via plugin to bypass Tailwind's broken opacity wrapper
      const themeNames = [
        "base", "surface", "surface-hover", "overlay", "muted", "subtle",
        "text-primary", "text-secondary", "brand", "brand-hover", "brand-accent"
      ];
      const opacityStops = [5, 10, 20, 30, 40, 50, 60, 70, 75, 80, 90, 95];

      const themePlugin = tailwind.plugin(function({ addUtilities }) {
        const utilities = {};
        themeNames.forEach(name => {
          const cls = name;            // e.g. "text-primary"
          const hex = `--c-${name}`;   // e.g. "--c-text-primary"
          const rgb = `--c-${name}-rgb`; // e.g. "--c-text-primary-rgb"

          // --- text --- (skip "base" to avoid conflict with Tailwind's text-base font-size utility)
          if (name !== 'base') {
            utilities[`.text-${cls}`]  = { color: `var(${hex})` };
          }
          // --- bg ---
          utilities[`.bg-${cls}`]    = { "background-color": `var(${hex})` };
          // --- border ---
          utilities[`.border-${cls}`] = { "border-color": `var(${hex})` };
          // --- ring ---
          utilities[`.ring-${cls}`]  = { "--tw-ring-color": `var(${hex})` };
          // --- shadow color ---
          utilities[`.shadow-${cls}`] = { "--tw-shadow-color": `var(${hex})` };
          // --- gradient from / via / to ---
          utilities[`.from-${cls}`] = { "--tw-gradient-from": `var(${hex})`, "--tw-gradient-to": `var(${hex}) / 0`, "--tw-gradient-stops": "var(--tw-gradient-from), var(--tw-gradient-to)" };
          utilities[`.to-${cls}`]   = { "--tw-gradient-to": `var(${hex})` };
          // --- placeholder ---
          utilities[`.placeholder-${cls}::placeholder`] = { color: `var(${hex})` };
          utilities[`.placeholder\\:text-${cls}::placeholder`] = { color: `var(${hex})` };

          // opacity variants
          opacityStops.forEach(stop => {
            const alpha = stop / 100;
            const val = `rgb(var(${rgb}) / ${alpha})`;
            utilities[`.text-${cls}-${stop}`]   = { color: val };
            utilities[`.bg-${cls}-${stop}`]     = { "background-color": val };
            utilities[`.border-${cls}-${stop}`] = { "border-color": val };
            utilities[`.ring-${cls}-${stop}`]   = { "--tw-ring-color": val };
            utilities[`.shadow-${cls}-${stop}`] = { "--tw-shadow-color": val };
            utilities[`.from-${cls}-${stop}`]   = { "--tw-gradient-from": val, "--tw-gradient-to": `rgb(var(${rgb}) / 0)`, "--tw-gradient-stops": "var(--tw-gradient-from), var(--tw-gradient-to)" };
            utilities[`.to-${cls}-${stop}`]     = { "--tw-gradient-to": val };
          });
        });
        addUtilities(utilities, { respectImportant: true, variants: ["responsive", "hover", "focus", "group-hover", "focus-within", "placeholder"] });
      });

      tailwind.config = {
        plugins: [themePlugin],
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              display: ["Oswald", "system-ui", "sans-serif"],
            },
            animation: {
              "fade-in": "fadeIn 0.5s ease-out",
              "slide-up": "slideUp 0.5s ease-out",
              "pulse-slow": "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
              slideUp: {
                "0%": { transform: "translateY(20px)", opacity: "0" },
                "100%": { transform: "translateY(0)", opacity: "1" },
              },
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.1.1/",
          "react": "https://aistudiocdn.com/react@^19.1.1",
          "uuid": "https://aistudiocdn.com/uuid@^11.1.0",
          "jszip": "https://aistudiocdn.com/jszip@^3.10.1",
          "vite": "https://aistudiocdn.com/vite@^7.1.4",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
          "@dnd-kit/sortable": "https://aistudiocdn.com/@dnd-kit/sortable@^10.0.0",
          "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.0.2",
          "@dnd-kit/utilities": "https://aistudiocdn.com/@dnd-kit/utilities@^3.2.2",
          "@dnd-kit/core": "https://aistudiocdn.com/@dnd-kit/core@^6.3.1",
          "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.8.2",
          "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.12",
          "@google/genai": "https://aistudiocdn.com/@google/genai@^1.16.0",
          "boring-avatars": "https://aistudiocdn.com/boring-avatars@^2.0.1"
        }
      }
    </script>
  </head>
  <body class="bg-base text-text-primary">
    <script>
      // Restore saved theme
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
